name: Build iOS IPA

on:
  push:
    branches:
      - dev
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 60

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify Flutter
        run: |
          flutter doctor -v
          pwd
          ls -la
          test -f pubspec.yaml

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch Sentry Flutter Plugin (imageByAddress fix)
        run: |
          FILE_PATH="$HOME/.pub-cache/hosted/pub.dev/sentry_flutter-8.14.2/ios/sentry_flutter/Sources/sentry_flutter/SentryFlutterPlugin.swift"
          if [ -f "$FILE_PATH" ]; then
            echo "Patching SentryFlutterPlugin.swift..."
            sed -i '' 's/\.binaryImageCache\.image(byAddress:/\.binaryImageCache.imageByAddress(/g' "$FILE_PATH"
          else
            echo "Warning: SentryFlutterPlugin.swift not found at $FILE_PATH"
          fi

      - name: Generate iOS configuration
        run: flutter build ios --config-only --no-codesign

      - name: Update CocoaPods Dependencies
        run: |
          cd ios
          pod update

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: kovari-ios-ipa
          path: apps/mobile/app.ipa